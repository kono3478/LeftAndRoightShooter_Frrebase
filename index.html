<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Defender - 管理画面</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: rgba(0, 242, 255, 0.15);
            --accent: #00f2ff;
            --danger: #ff4d4d;
            --warn: #ff9f43;
            --success: #2ecc71;
            --text: #e0e0e0;
            --muted: #666;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* HEADER */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
        }
        .header h1 {
            font-size: 22px; letter-spacing: 4px; color: var(--accent);
            text-shadow: 0 0 20px rgba(0,242,255,.4);
        }
        .header p { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }

        /* STATS CARDS */
        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px 20px;
        }
        .stat-card .label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: var(--accent); line-height: 1; }
        .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

        /* TOOLBAR */
        .toolbar {
            display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center;
        }
        .toolbar select, .toolbar input {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none;
        }
        .toolbar select:focus, .toolbar input:focus { border-color: var(--accent); }
        .spacer { flex: 1; }
        .btn {
            padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: bold;
            cursor: pointer; border: none; transition: all .2s; display: flex; align-items: center; gap: 6px;
        }
        .btn-csv { background: rgba(0,242,255,.12); color: var(--accent); border: 1px solid var(--accent); }
        .btn-csv:hover { background: rgba(0,242,255,.22); }
        .btn-reset { background: rgba(255,77,77,.12); color: var(--danger); border: 1px solid var(--danger); }
        .btn-reset:hover { background: rgba(255,77,77,.22); }
        .btn-reload { background: rgba(255,255,255,.06); color: #aaa; border: 1px solid #333; }
        .btn-reload:hover { background: rgba(255,255,255,.1); }

        /* TABLE */
        .table-wrap {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead tr { background: rgba(0,242,255,.07); }
        th {
            padding: 13px 16px; text-align: left; font-size: 11px; letter-spacing: 2px;
            color: var(--accent); text-transform: uppercase; font-weight: 600;
            border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
            white-space: nowrap;
        }
        th:hover { color: #fff; }
        th .sort-icon { margin-left: 4px; opacity: .4; }
        th.sorted .sort-icon { opacity: 1; }
        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,.04);
            transition: background .15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,.03); }
        td { padding: 11px 16px; color: var(--text); }
        td.score { color: var(--accent); font-weight: bold; font-size: 15px; }
        td.nickname { font-weight: 600; }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 20px;
            font-size: 11px; font-weight: bold; letter-spacing: 1px;
        }
        .badge-mode1 { background: rgba(0,242,255,.15); color: var(--accent); }
        .badge-mode2 { background: rgba(255,159,67,.15); color: var(--warn); }
        .badge-on  { background: rgba(255,77,77,.15); color: var(--danger); }
        .badge-off { background: rgba(46,204,113,.15); color: var(--success); }

        .rank-medal { font-size: 18px; }

        /* EMPTY / LOADING */
        .empty-row td {
            text-align: center; padding: 50px; color: var(--muted); font-size: 14px;
        }

        /* CONFIRM MODAL */
        #confirm-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.85); z-index: 999;
            justify-content: center; align-items: center;
        }
        #confirm-modal.show { display: flex; }
        .confirm-box {
            background: #0d0d1f; border: 2px solid var(--danger);
            border-radius: 18px; padding: 35px; text-align: center;
            width: 360px; max-width: 90vw;
            box-shadow: 0 0 50px rgba(255,77,77,.2);
            animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
        .confirm-box h3 { color: var(--danger); font-size: 20px; margin-bottom: 12px; }
        .confirm-box p { color: #aaa; font-size: 13px; line-height: 1.7; margin-bottom: 24px; }
        .confirm-box strong { color: #fff; }
        .confirm-btns { display: flex; gap: 10px; }
        .btn-confirm-yes {
            flex: 1; background: var(--danger); color: #fff; border: none;
            padding: 13px; border-radius: 50px; font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .btn-confirm-no {
            flex: 1; background: rgba(255,255,255,.08); color: #777; border: 1px solid #333;
            padding: 13px; border-radius: 50px; font-size: 13px; cursor: pointer;
        }

        /* TOAST */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #1a1a2e; border: 1px solid var(--border); border-radius: 50px;
            padding: 12px 24px; font-size: 13px; color: #fff;
            transition: transform .3s cubic-bezier(.34,1.56,.64,1); z-index: 9999;
            pointer-events: none; white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .loading-text { color: var(--muted); font-size: 13px; padding: 20px 0; }
        .count-label { font-size: 12px; color: var(--muted); margin-left: 4px; }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: flex-start; }
            th, td { padding: 10px 10px; font-size: 12px; }
            .btn { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>SPACE DEFENDER <span style="font-size:14px;opacity:.5">/ ADMIN</span></h1>
        <p>Firebase Realtime Database 管理画面</p>
    </div>
    <div style="font-size:12px;color:var(--muted);text-align:right">
        <div id="db-status" style="color:#ff9f43">● 接続中...</div>
        <div id="last-updated" style="margin-top:4px"></div>
    </div>
</div>

<!-- STATS -->
<div class="stats-row">
    <div class="stat-card">
        <div class="label">総プレイ数</div>
        <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
        <div class="label">最高スコア</div>
        <div class="value" id="stat-best">—</div>
        <div class="sub" id="stat-best-player"></div>
    </div>
    <div class="stat-card">
        <div class="label">平均スコア</div>
        <div class="value" id="stat-avg">—</div>
    </div>
    <div class="stat-card">
        <div class="label">MODE 1 / MODE 2</div>
        <div class="value" id="stat-modes">—</div>
    </div>
    <div class="stat-card">
        <div class="label">当たり判定ON</div>
        <div class="value" id="stat-collision">—</div>
        <div class="sub">プレイ中</div>
    </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
    <select id="filter-mode" onchange="applyFilter()">
        <option value="all">全モード</option>
        <option value="1">MODE 1</option>
        <option value="2">MODE 2</option>
    </select>
    <select id="filter-collision" onchange="applyFilter()">
        <option value="all">当たり判定: すべて</option>
        <option value="true">当たり判定: ON</option>
        <option value="false">当たり判定: OFF</option>
    </select>
    <input id="search-nick" type="text" placeholder="🔍 ニックネーム検索" oninput="applyFilter()" style="min-width:160px">
    <span id="row-count" class="count-label"></span>
    <div class="spacer"></div>
    <button class="btn btn-reload" onclick="loadData()">↺ 再読み込み</button>
    <button class="btn btn-csv" onclick="downloadCSV()">⬇ CSVダウンロード</button>
    <button class="btn btn-reset" onclick="openConfirm()">🗑 データリセット</button>
</div>

<!-- TABLE -->
<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th onclick="sortBy('rank')">#<span class="sort-icon">↕</span></th>
                <th onclick="sortBy('nickname')" id="th-nickname">ニックネーム<span class="sort-icon">↕</span></th>
                <th onclick="sortBy('score')" id="th-score" class="sorted">スコア<span class="sort-icon">▼</span></th>
                <th onclick="sortBy('mode')">モード<span class="sort-icon">↕</span></th>
                <th onclick="sortBy('collisionEnabled')">当たり判定<span class="sort-icon">↕</span></th>
                <th onclick="sortBy('dominantHand')">利き手<span class="sort-icon">↕</span></th>
                <th onclick="sortBy('overheatCount')">OHeat<span class="sort-icon">↕</span></th>
                <th onclick="sortBy('missCount')">MISS<span class="sort-icon">↕</span></th>
                <th onclick="sortBy('timestamp')">日時<span class="sort-icon">↕</span></th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr class="empty-row"><td colspan="9">読み込み中...</td></tr>
        </tbody>
    </table>
</div>

<!-- CONFIRM MODAL -->
<div id="confirm-modal">
    <div class="confirm-box">
        <h3>⚠️ データリセット</h3>
        <p>保存されている<strong>全スコアデータ</strong>を削除します。<br>この操作は取り消せません。本当に実行しますか？</p>
        <div class="confirm-btns">
            <button class="btn-confirm-yes" onclick="executeReset()">削除する</button>
            <button class="btn-confirm-no" onclick="closeConfirm()">キャンセル</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove }
                          from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

// =============================================
//  Firebase Config（ゲームと同じ設定）
// =============================================
const firebaseConfig = {
    apiKey:            "AIzaSyAWUDUE9GklRNJGg0OoaZrBDn4C91VEEEI",
    authDomain:        "leftandroightshooter.firebaseapp.com",
    databaseURL:       "https://leftandroightshooter-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "leftandroightshooter",
    storageBucket:     "leftandroightshooter.firebasestorage.app",
    messagingSenderId: "696555404744",
    appId:             "1:696555404744:web:47a3c35636d68995e094fd"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// =============================================
//  State
// =============================================
let allRows = [];       // 全データ（ソート済み）
let filteredRows = [];  // フィルタ後
let sortKey = 'score';
let sortAsc = false;

// =============================================
//  Load data
// =============================================
window.loadData = function() {
    document.getElementById('db-status').textContent = '● 接続中...';
    document.getElementById('db-status').style.color = '#ff9f43';
    document.getElementById('table-body').innerHTML = '<tr class="empty-row"><td colspan="9">読み込み中...</td></tr>';

    onValue(ref(db, 'scores'), snap => {
        allRows = [];
        if (snap.exists()) {
            snap.forEach(modeSnap => {
                // "mode1" → 1, "mode2" → 2 を確実に数値で取得
                const modeNum = parseInt(modeSnap.key.replace('mode',''), 10);
                modeSnap.forEach(entrySnap => {
                    const d = entrySnap.val();
                    // d.mode が存在しない古いデータはmodeNumで補完
                    const modeVal = (d.mode !== undefined && !isNaN(Number(d.mode)))
                        ? Number(d.mode) : modeNum;
                    allRows.push({
                        key:       entrySnap.key,
                        modeKey:   modeSnap.key,
                        nickname:  d.nickname  || '???',
                        score:     Number(d.score) || 0,
                        mode:      modeVal,
                        collisionEnabled: !!d.collisionEnabled,
                        overheatCount: Number(d.overheatCount) || 0,
                        missCount:     Number(d.missCount)     || 0,
                        dominantHand:  d.dominantHand || '—',
                        timestamp: d.timestamp || 0
                    });
                });
            });
        }

        document.getElementById('db-status').textContent = '● 接続済み';
        document.getElementById('db-status').style.color = '#2ecc71';
        document.getElementById('last-updated').textContent =
            '最終更新: ' + new Date().toLocaleTimeString('ja-JP');

        updateStats();
        applyFilter();
    }, err => {
        document.getElementById('db-status').textContent = '● 接続エラー';
        document.getElementById('db-status').style.color = '#ff4d4d';
        document.getElementById('table-body').innerHTML =
            `<tr class="empty-row"><td colspan="9">エラー: ${err.message}</td></tr>`;
    });
};

// =============================================
//  Stats
// =============================================
function updateStats() {
    const total = allRows.length;
    document.getElementById('stat-total').textContent = total.toLocaleString();

    if (total === 0) {
        ['stat-best','stat-avg','stat-modes','stat-collision'].forEach(id => {
            document.getElementById(id).textContent = '—';
        });
        document.getElementById('stat-best-player').textContent = '';
        return;
    }

    const sorted = [...allRows].sort((a,b) => b.score - a.score);
    document.getElementById('stat-best').textContent = sorted[0].score.toLocaleString();
    document.getElementById('stat-best-player').textContent = sorted[0].nickname;

    const avg = Math.round(allRows.reduce((s,r) => s+r.score, 0) / total);
    document.getElementById('stat-avg').textContent = avg.toLocaleString();

    const m1 = allRows.filter(r => r.mode===1).length;
    const m2 = allRows.filter(r => r.mode===2).length;
    document.getElementById('stat-modes').textContent = `${m1} / ${m2}`;

    const colOn = allRows.filter(r => r.collisionEnabled).length;
    document.getElementById('stat-collision').textContent =
        total ? `${colOn} / ${total}` : '—';
}

// =============================================
//  Filter + Sort + Render
// =============================================
window.applyFilter = function() {
    const modeF  = document.getElementById('filter-mode').value;
    const colF   = document.getElementById('filter-collision').value;
    const nick   = document.getElementById('search-nick').value.trim().toLowerCase();

    filteredRows = allRows.filter(r => {
        if (modeF !== 'all' && String(r.mode) !== modeF) return false;
        if (colF  !== 'all' && String(r.collisionEnabled) !== colF) return false;
        if (nick  && !r.nickname.toLowerCase().includes(nick)) return false;
        return true;
    });

    sortRows();
    renderTable();
};

window.sortBy = function(key) {
    if (sortKey === key) { sortAsc = !sortAsc; }
    else { sortKey = key; sortAsc = key === 'nickname'; }

    // update header icons
    document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
    const icons = {'score':'th-score','nickname':'th-nickname'};
    if (icons[key]) document.getElementById(icons[key])?.classList.add('sorted');

    sortRows();
    renderTable();
};

function sortRows() {
    filteredRows.sort((a, b) => {
        let va = a[sortKey], vb = b[sortKey];
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return sortAsc ? -1 : 1;
        if (va > vb) return sortAsc ? 1 : -1;
        return 0;
    });
}

const MEDALS = ['🥇','🥈','🥉'];

function renderTable() {
    const tbody = document.getElementById('table-body');
    document.getElementById('row-count').textContent =
        `${filteredRows.length.toLocaleString()} 件`;

    if (filteredRows.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="9">データがありません</td></tr>';
        return;
    }

    // スコア順ランクを全体で計算
    const scoreRanks = {};
    [...allRows].sort((a,b)=>b.score-a.score).forEach((r,i) => {
        if (!scoreRanks[r.key]) scoreRanks[r.key] = i+1;
    });

    tbody.innerHTML = filteredRows.map((r, i) => {
        const rank  = scoreRanks[r.key] || (i+1);
        const medal = rank <= 3 ? MEDALS[rank-1] : rank;
        const dt    = r.timestamp
            ? new Date(r.timestamp).toLocaleString('ja-JP', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
            : '—';
        return `<tr>
            <td><span class="rank-medal">${medal}</span></td>
            <td class="nickname">${esc(r.nickname)}</td>
            <td class="score">${r.score.toLocaleString()}</td>
            <td><span class="badge badge-mode${r.mode}">MODE ${r.mode}</span></td>
            <td><span class="badge ${r.collisionEnabled ? 'badge-on' : 'badge-off'}">${r.collisionEnabled ? 'ON' : 'OFF'}</span></td>
            <td style="text-align:center">${{right:"✋右",left:"🤚左",both:"👐両"}[r.dominantHand]||r.dominantHand}</td>
            <td style="text-align:center;color:var(--warn)">${r.overheatCount}</td>
            <td style="text-align:center;color:var(--danger)">${r.collisionEnabled ? r.missCount : '—'}</td>
            <td style="color:var(--muted)">${dt}</td>
        </tr>`;
    }).join('');
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =============================================
//  CSV Download
// =============================================
window.downloadCSV = function() {
    if (filteredRows.length === 0) { showToast('⚠️ ダウンロードするデータがありません'); return; }

    const headers = ['rank','nickname','score','mode','collisionEnabled','dominantHand','overheatCount','missCount','timestamp'];
    const scoreRanks = {};
    [...allRows].sort((a,b)=>b.score-a.score).forEach((r,i) => {
        if (!scoreRanks[r.key]) scoreRanks[r.key] = i+1;
    });

    const rows = filteredRows.map(r => [
        scoreRanks[r.key] || '',
        `"${r.nickname.replace(/"/g,'""')}"`,
        r.score,
        r.mode,
        r.collisionEnabled ? 'ON' : 'OFF',
        r.dominantHand,
        r.overheatCount,
        r.collisionEnabled ? r.missCount : '',
        r.timestamp ? new Date(r.timestamp).toLocaleString('ja-JP') : ''
    ]);

    const csv = '\uFEFF' + [headers, ...rows].map(row => row.join(',')).join('\r\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `space-defender-scores_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`✅ ${filteredRows.length}件のデータをダウンロードしました`);
};

// =============================================
//  Reset
// =============================================
window.openConfirm  = () => document.getElementById('confirm-modal').classList.add('show');
window.closeConfirm = () => document.getElementById('confirm-modal').classList.remove('show');

window.executeReset = async function() {
    closeConfirm();
    try {
        await remove(ref(db, 'scores'));
        showToast('🗑 全データを削除しました');
    } catch(e) {
        showToast('❌ エラー: ' + e.message);
    }
};

// =============================================
//  Toast
// =============================================
let toastTimer;
window.showToast = function(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
};

// =============================================
//  Init
// =============================================
loadData();
</script>
</body>
</html>
