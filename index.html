<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>スペース・ディフェンダー - Firebase Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #020205; --panel-color: #e0e0e0; --game-bg: #050510;
            --text-color: #ffffff; --accent-color: #00f2ff; --heat-color: #ff9f43;
            --danger-color: #ff4d4d; --panel-border: #999;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: sans-serif; user-select: none; touch-action: none; }
        
        /* ID入力画面 */
        #id-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b1b2f 0%, #020205 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000;
        }
        .id-box {
            background: rgba(255, 255, 255, 0.07); border: 2px solid var(--accent-color);
            padding: 40px; border-radius: 24px; backdrop-filter: blur(10px); text-align: center;
        }
        .id-box input {
            font-size: 32px; width: 160px; text-align: center; margin: 20px 0;
            background: #000; color: var(--accent-color); border: 1px solid var(--accent-color);
            border-radius: 8px; outline: none;
        }

        #game-container { position: relative; width: 100vw; height: 100dvh; display: flex; flex-direction: row; }
        #screen-title { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1b1b2f 0%, #020205 100%); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn-mode { width: 280px; padding: 18px; margin: 8px 0; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent-color); border-radius: 14px; color: white; font-weight: bold; cursor: pointer; }
        
        .control-panel { width: 220px; height: 100%; background-color: var(--panel-color); position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid var(--panel-border); box-sizing: border-box; z-index: 10; }
        #game-field { flex-grow: 1; position: relative; background-color: var(--game-bg); overflow: hidden; }
        #gameCanvas { width: 100%; height: 100%; display: block; }
        
        .joystick-container { position: relative; width: 150px; height: 150px; background: #ccc; border-radius: 50%; border: 6px solid #888; }
        .joystick-knob { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; background: #222; border-radius: 50%; }
        .fire-button { width: 120px; height: 120px; background: radial-gradient(circle, #ff4d4d, #900); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 20px; box-shadow: 0 5px 0 #600; }
        .fire-button:active { transform: translateY(3px); box-shadow: 0 2px 0 #600; }
        
        #hud { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: white; text-align: center; pointer-events: none; z-index: 20; font-weight: bold; }
        #screen-result { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5, 5, 20, 0.95); border: 2px solid var(--accent-color); padding: 30px; border-radius: 20px; color: white; text-align: center; display: none; z-index: 150; }
    </style>
</head>
<body>

<div id="id-overlay">
    <div class="id-box">
        <h2 style="color: white;">PLAYER ENTRY</h2>
        <input type="number" id="player-id-input" placeholder="0000" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
        <br>
        <button class="btn-mode" onclick="verifyID()">ENTRY</button>
    </div>
</div>

<div id="screen-title">
    <h1 style="color: var(--accent-color); letter-spacing: 5px; font-size: 40px; margin-bottom: 30px;">SPACE DEFENDER</h1>
    <button class="btn-mode" onclick="startGame(1)">MODE 1 (L:STICK / R:FIRE)</button>
    <button class="btn-mode" onclick="startGame(2)">MODE 2 (R:STICK / L:FIRE)</button>
    <button id="collision-toggle" class="btn-mode" onclick="toggleCollision()" style="font-size: 14px; width: 220px; margin-top: 20px;">🛡️ Collision: OFF</button>
</div>

<div id="game-container">
    <div id="left-panel" class="control-panel"></div>
    <div id="game-field">
        <div id="hud">
            <div style="font-size: 20px; margin-bottom: 5px;">TIME: <span id="timer">30</span> | SCORE: <span id="score">0</span></div>
            <div id="heat-warning" style="color: var(--danger-color); visibility: hidden; font-size: 14px;">OVERHEAT!</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="screen-result">
            <h2 style="color: var(--accent-color);">MISSION COMPLETE</h2>
            <div id="final-score" style="font-size: 60px; margin: 20px;">0</div>
            <button class="btn-mode" onclick="location.reload()">TITLE</button>
        </div>
    </div>
    <div id="right-panel" class="control-panel"></div>
</div>

<script>
    // --- Firebase Config ---
    const firebaseConfig = {
        apiKey: "AIzaSyAWUDUE9GklRNJGg0OoaZrBDn4C91VEEEI",
        authDomain: "leftandroightshooter.firebaseapp.com",
        databaseURL: "https://leftandroightshooter-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "leftandroightshooter",
        storageBucket: "leftandroightshooter.firebasestorage.app",
        messagingSenderId: "696555404744",
        appId: "1:696555404744:web:47a3c35636d68995e094fd",
        measurementId: "G-TF47F86Q97"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Variables ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let playerID = "";
    let gameStage = 0; // 0: Title, 1: Playing, 2: Result
    let score = 0, timeLeft = 30, timerInterval;
    let ship = { x: 0, y: 0, targetX: 0, targetY: 0, size: 40 };
    let enemies = [], bullets = [], particles = [];
    let heat = 0, isOverheated = false, isHitDetectionEnabled = false, currentMode = 1;
    let joystick = { active: false, startX: 0, startY: 0, angle: 0, distance: 0, maxDist: 40 };
    let firePressed = false;

    function verifyID() {
        const input = document.getElementById('player-id-input');
        if (input.value.length === 4) {
            playerID = input.value;
            document.getElementById('id-overlay').style.display = 'none';
            document.getElementById('screen-title').style.display = 'flex';
            resize();
        } else { alert("4桁の数字を入力してください"); }
    }

    function toggleCollision() {
        isHitDetectionEnabled = !isHitDetectionEnabled;
        document.getElementById('collision-toggle').innerText = isHitDetectionEnabled ? "⚠️ Collision: ON" : "🛡️ Collision: OFF";
    }

    function resize() {
        const rect = document.getElementById('game-field').getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ship.x = ship.targetX = canvas.width / 2;
        ship.y = ship.targetY = canvas.height * 0.8;
    }

    function setupControls() {
        const l = document.getElementById('left-panel'), r = document.getElementById('right-panel');
        l.innerHTML = ''; r.innerHTML = '';
        const joyHTML = '<div class="joystick-container" id="joy-base"><div class="joystick-knob" id="joy-knob"></div></div>';
        const fireHTML = '<div class="fire-button" id="fire-btn">FIRE</div>';
        
        if(currentMode === 1) { l.innerHTML = joyHTML; r.innerHTML = fireHTML; }
        else { l.innerHTML = fireHTML; r.innerHTML = joyHTML; }

        const joyBase = document.getElementById('joy-base');
        const fireBtn = document.getElementById('fire-btn');

        const startJoy = (e) => {
            joystick.active = true;
            const rect = joyBase.getBoundingClientRect();
            joystick.startX = rect.left + rect.width/2;
            joystick.startY = rect.top + rect.height/2;
            moveJoy(e);
        };
        const moveJoy = (e) => {
            if(!joystick.active) return;
            const t = e.touches ? e.touches[0] : e;
            const dx = t.clientX - joystick.startX, dy = t.clientY - joystick.startY;
            joystick.distance = Math.min(Math.sqrt(dx*dx + dy*dy), joystick.maxDist);
            joystick.angle = Math.atan2(dy, dx);
            const knob = document.getElementById('joy-knob');
            if(knob) knob.style.transform = `translate(calc(-50% + ${Math.cos(joystick.angle)*joystick.distance}px), calc(-50% + ${Math.sin(joystick.angle)*joystick.distance}px))`;
        };
        const endJoy = () => {
            joystick.active = false;
            const knob = document.getElementById('joy-knob');
            if(knob) knob.style.transform = 'translate(-50%, -50%)';
        };

        joyBase.addEventListener('mousedown', startJoy);
        joyBase.addEventListener('touchstart', startJoy, {passive: false});
        window.addEventListener('mousemove', moveJoy);
        window.addEventListener('touchmove', moveJoy, {passive: false});
        window.addEventListener('mouseup', endJoy);
        window.addEventListener('touchend', endJoy);

        fireBtn.addEventListener('mousedown', () => firePressed = true);
        fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); firePressed = true; });
        window.addEventListener('mouseup', () => firePressed = false);
        window.addEventListener('touchend', () => firePressed = false);
    }

    function startGame(mode) {
        currentMode = mode;
        setupControls();
        resize();
        gameStage = 1; score = 0; timeLeft = 30; heat = 0; isOverheated = false;
        enemies = []; bullets = []; particles = [];
        document.getElementById('screen-title').style.display = 'none';
        document.getElementById('screen-result').style.display = 'none';
        
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) finishGame();
        }, 1000);

        requestAnimationFrame(gameLoop);
    }

    function finishGame() {
        clearInterval(timerInterval);
        gameStage = 2;
        document.getElementById('screen-result').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        db.ref('scores').push({
            id: playerID, mode: "MODE "+currentMode, 
            collision: isHitDetectionEnabled?"ON":"OFF", 
            score: score, date: new Date().toLocaleString()
        });
    }

    function gameLoop() {
        if(gameStage !== 1) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        // 自機移動
        if(joystick.active) {
            ship.targetX += Math.cos(joystick.angle) * joystick.distance * 0.2;
            ship.targetY += Math.sin(joystick.angle) * joystick.distance * 0.2;
        }
        ship.targetX = Math.max(20, Math.min(canvas.width-20, ship.targetX));
        ship.targetY = Math.max(20, Math.min(canvas.height-20, ship.targetY));
        ship.x += (ship.targetX - ship.x) * 0.2;
        ship.y += (ship.targetY - ship.y) * 0.2;

        // 弾道
        if(firePressed && !isOverheated && Math.random() < 0.25) {
            bullets.push({ x: ship.x, y: ship.y - 20 });
            heat += 3.5;
        }
        heat = Math.max(0, heat - (isOverheated ? 0.4 : 1.2));
        if(heat >= 100) { heat = 100; isOverheated = true; }
        if(heat === 0) isOverheated = false;
        document.getElementById('heat-warning').style.visibility = isOverheated ? 'visible' : 'hidden';

        // 敵出現
        if(Math.random() < 0.06) {
            enemies.push({ x: Math.random()*canvas.width, y: -50, size: 30 + Math.random()*30, speed: 2 + Math.random()*2 });
        }

        // 判定処理
        bullets.forEach((b, bi) => {
            b.y -= 12;
            if(b.y < -20) bullets.splice(bi, 1);
            enemies.forEach((e, ei) => {
                if(Math.hypot(b.x - e.x, b.y - e.y) < e.size/2) {
                    bullets.splice(bi, 1);
                    score += 100;
                    enemies.splice(ei, 1);
                }
            });
        });

        enemies.forEach((e, ei) => {
            e.y += e.speed;
            if(e.y > canvas.height + 50) enemies.splice(ei, 1);
            if(isHitDetectionEnabled && Math.hypot(ship.x - e.x, ship.y - e.y) < 30) {
                score = Math.max(0, score - 5);
            }
        });
        document.getElementById('score').innerText = score;
    }

    function draw() {
        // 背景クリア
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 弾
        ctx.fillStyle = '#ff0';
        bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
            ctx.fill();
        });

        // 敵
        enemies.forEach(e => {
            ctx.strokeStyle = '#ff4d4d';
            ctx.lineWidth = 3;
            ctx.strokeRect(e.x - e.size/2, e.y - e.size/2, e.size, e.size);
            ctx.fillStyle = 'rgba(255, 77, 77, 0.2)';
            ctx.fillRect(e.x - e.size/2, e.y - e.size/2, e.size, e.size);
        });

        // 自機 (元の三角形デザインを正確に描画)
        ctx.save();
        ctx.translate(ship.x, ship.y);
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';
        ctx.fillStyle = '#00f2ff';
        // メインボディ
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(-18, 15);
        ctx.lineTo(18, 15);
        ctx.closePath();
        ctx.fill();
        // ウィング
        ctx.beginPath();
        ctx.moveTo(-18, 5); ctx.lineTo(-28, 20); ctx.lineTo(-18, 20); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(18, 5); ctx.lineTo(28, 20); ctx.lineTo(18, 20); ctx.fill();
        ctx.restore();
    }

    // Admin commands
    window.addEventListener('keydown', (e) => {
        if(e.shiftKey && e.key === 'D') {
            db.ref('scores').once('value').then(s => {
                const val = s.val();
                if(!val) return alert("データなし");
                let csv = "ID,Mode,Collision,Score,Date\n";
                Object.values(val).forEach(v => {
                    csv += `${v.id},${v.mode},${v.collision},${v.score},${v.date}\n`;
                });
                const blob = new Blob([csv], {type: 'text/csv'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "shooter_scores.csv";
                a.click();
            });
        }
        if(e.shiftKey && e.key === 'R') {
            if(confirm("全消去しますか？")) db.ref('scores').remove().then(()=>alert("完了"));
        }
    });

</script>
</body>
</html>
