<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>スペース・ディフェンダー - Firebase Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #020205; --panel-color: #e0e0e0; --game-bg: #050510;
            --text-color: #ffffff; --accent-color: #00f2ff; --heat-color: #ff9f43;
            --danger-color: #ff4d4d; --panel-border: #999;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; height: 100dvh; overflow: hidden; background-color: var(--bg-color); font-family: sans-serif; user-select: none; touch-action: none; -webkit-user-select: none; }
        
        /* ID入力用オーバーレイ */
        #id-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b1b2f 0%, #020205 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000;
        }
        .id-box { background: rgba(255, 255, 255, 0.07); border: 2px solid var(--accent-color); padding: 40px; border-radius: 24px; backdrop-filter: blur(10px); text-align: center; }
        .id-box input { font-size: 32px; width: 160px; text-align: center; margin: 20px 0; background: #000; color: var(--accent-color); border: 1px solid var(--accent-color); border-radius: 8px; outline: none; }

        /* オリジナルスタイル */
        #game-container { position: relative; width: 100vw; height: 100dvh; display: flex; flex-direction: row; overflow: hidden; }
        #orientation-warning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f3460; color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; text-align: center; }
        @media (orientation: portrait) { #orientation-warning { display: flex; } }
        #screen-title { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1b1b2f 0%, #020205 100%); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box; }
        #screen-title h1 { color: var(--accent-color); font-size: clamp(28px, 8vw, 56px); letter-spacing: 10px; text-shadow: 0 0 25px rgba(0, 242, 255, 0.6); margin-bottom: 40px; }
        .menu-layout { display: flex; gap: 30px; width: 100%; max-width: 900px; }
        .menu-section { flex: 1; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; padding: 25px; display: flex; flex-direction: column; align-items: center; }
        .btn-mode { background: var(--accent-color); color: #000; border: none; padding: 18px 24px; font-size: 14px; font-weight: bold; margin-bottom: 15px; border-radius: 50px; cursor: pointer; width: 100%; }
        .toggle-btn { background: #222; border: 2px solid #444; color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; width: 100%; }
        .toggle-btn.active { background: var(--danger-color); border-color: #ff8888; }
        .control-panel { width: 18%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--panel-color); border: 3px solid var(--panel-border); z-index: 10; }
        #game-field { flex-grow: 1; position: relative; background: var(--game-bg); }
        canvas { display: block; width: 100%; height: 100%; }
        #hud { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: white; text-align: center; pointer-events: none; z-index: 20; }
        #screen-result { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5, 5, 20, 0.95); border: 2px solid var(--accent-color); padding: 30px 40px; border-radius: 20px; color: white; text-align: center; display: none; z-index: 150; }
    </style>
</head>
<body>

    <div id="id-overlay">
        <div class="id-box">
            <h2>PLAYER ACCESS</h2>
            <input type="text" id="player-id-input" maxlength="4" placeholder="0000">
            <br>
            <button class="btn-mode" onclick="verifyID()">ENTRY SYSTEM</button>
        </div>
    </div>

    <div id="screen-title">
        <h1>SPACE DEFENDER</h1>
        <div class="menu-layout">
            <div class="menu-section">
                <button class="btn-mode" onclick="startGame(1)">MODE 1 (L:STICK / R:FIRE)</button>
                <button class="btn-mode" onclick="startGame(2)">MODE 2 (R:STICK / L:FIRE)</button>
            </div>
            <div class="menu-section">
                <button id="collision-toggle" class="toggle-btn" onclick="toggleCollision()">🛡️ OFF (安全)</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="left-panel" class="control-panel"></div>
        <div id="game-field">
            <div id="hud">
                <div style="display: flex; gap: 25px; font-size: 18px;">
                    <div>TIME: <span id="timer">30</span>s</div>
                    <div>SCORE: <span id="score">0</span></div>
                    <div>BEST: <span id="best-score">0</span></div>
                </div>
                <div style="width: 200px; height: 10px; background: #333; margin-top: 5px;"><div id="heat-bar" style="height: 100%; width: 0%; background: orange;"></div></div>
                <div id="heat-warning" style="color: red; visibility: hidden; font-size: 12px;">OVERHEATED!</div>
            </div>
            <canvas id="gameCanvas"></canvas>
            <div id="screen-result">
                <h2>MISSION COMPLETE</h2>
                <div id="final-score" style="font-size: 48px;">0</div>
                <button class="btn-mode" onclick="location.reload()">RETRY</button>
            </div>
        </div>
        <div id="right-panel" class="control-panel"></div>
    </div>

<script>
    // --- Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSyAWUDUE9GklRNJGg0OoaZrBDn4C91VEEEI",
        authDomain: "leftandroightshooter.firebaseapp.com",
        databaseURL: "https://leftandroightshooter-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "leftandroightshooter",
        storageBucket: "leftandroightshooter.firebasestorage.app",
        messagingSenderId: "696555404744",
        appId: "1:696555404744:web:47a3c35636d68995e094fd",
        measurementId: "G-TF47F86Q97"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Variables ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let playerID = "";
    let gameState = 'init_screen'; // ID入力待ち
    let score = 0, timeLeft = 30, gameMode = 1, isCollisionEnabled = false, missCount = 0, overheatCount = 0;
    
    const sounds = {
        shoot: new Audio('https://raw.githubusercontent.com/kono3478/ShootingSE_NES/main/NES-Shooter01-1(Shoot).mp3'),
        bgm: new Audio('https://raw.githubusercontent.com/kono3478/BGM/main/8bit-act04_stage01.mp3'),
        death: new Audio('https://raw.githubusercontent.com/kono3478/ShootingSE_NES/main/NES-Shooter01-5(Damage).mp3')
    };
    sounds.bgm.loop = true;

    const player = { x: 0, y: 0, radius: 18, baseSpeed: 6.5, angle: 0, color: '#00f2ff', heat: 0, isOverheated: false };
    const joystick = { active: false, vectorX: 0, vectorY: 0, maxRadius: 45 };
    let actionPressed = false;
    let bullets = [], enemies = [], particles = [], stars = [];
    const keys = { up: false, down: false, left: false, right: false };

    // --- Functions ---
    function verifyID() {
        const val = document.getElementById('player-id-input').value;
        if (val.length === 4) {
            playerID = val;
            gameState = 'title';
            document.getElementById('id-overlay').style.display = 'none';
            document.getElementById('screen-title').style.display = 'flex';
            init(); 
        } else { alert("4桁入力してください"); }
    }

    function init() {
        resize();
        window.addEventListener('resize', resize);
        stars = [];
        for(let i=0; i<80; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: 0.5+Math.random()});
        requestAnimationFrame(gameLoop);
    }

    function resize() {
        const rect = document.getElementById('game-field').getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        player.x = canvas.width/2; player.y = canvas.height/2;
    }

    function startGame(mode) {
        gameMode = mode; gameState = 'playing'; score = 0; timeLeft = 30;
        enemies = []; bullets = []; particles = []; overheatCount = 0; missCount = 0;
        document.getElementById('screen-title').style.display = 'none';
        setupControls();
        sounds.bgm.play().catch(()=>{});
        setInterval(() => { if(gameState==='playing'){ timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft<=0) endGame(); } }, 1000);
    }

    function endGame() {
        gameState = 'gameover'; sounds.bgm.pause();
        document.getElementById('screen-result').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        // Firebase保存
        db.ref('scores').push({ id: playerID, mode: "MODE "+gameMode, collision: isCollisionEnabled?"ON":"OFF", score, overheats: overheatCount, misses: missCount, date: new Date().toLocaleString() });
    }

    // --- 管理者コマンド (Shift+D / Shift+R) ---
    window.addEventListener('keydown', (e) => {
        // ゲーム中の移動キー
        if (['ArrowUp','w'].includes(e.key)) keys.up = true;
        if (['ArrowDown','s'].includes(e.key)) keys.down = true;
        if (['ArrowLeft','a'].includes(e.key)) keys.left = true;
        if (['ArrowRight','d'].includes(e.key)) keys.right = true;

        // 【重要】管理者コマンド：タイトル画面でなくてもID確定後なら反応するように
        if (playerID !== "") {
            if (e.shiftKey && e.code === 'KeyD') {
                db.ref('scores').once('value').then(snap => {
                    const data = snap.val(); if(!data) return alert("No data");
                    let csv = "ID,Mode,Score,Date\n";
                    Object.values(data).forEach(v => csv += `${v.id},${v.mode},${v.score},${v.date}\n`);
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
                    a.download = "scores.csv"; a.click();
                });
            }
            if (e.shiftKey && e.code === 'KeyR') {
                if(confirm("Clear Firebase?")) db.ref('scores').remove().then(()=>alert("Reset Done"));
            }
        }
    });
    window.addEventListener('keyup', (e) => {
        if (['ArrowUp','w'].includes(e.key)) keys.up = false;
        if (['ArrowDown','s'].includes(e.key)) keys.down = false;
        if (['ArrowLeft','a'].includes(e.key)) keys.left = false;
        if (['ArrowRight','d'].includes(e.key)) keys.right = false;
    });

    // --- Original Logic (描画・更新) ---
    function gameLoop() {
        update(); draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        if(gameState !== 'playing') return;
        
        // 移動
        let iX = joystick.vectorX, iY = joystick.vectorY;
        if(!joystick.active) {
            if(keys.left) iX = -1; if(keys.right) iX = 1; if(keys.up) iY = -1; if(keys.down) iY = 1;
        }
        player.x += iX * player.baseSpeed; player.y += iY * player.baseSpeed;
        player.x = Math.max(20, Math.min(canvas.width-20, player.x));
        player.y = Math.max(20, Math.min(canvas.height-20, player.y));
        if(Math.hypot(iX, iY) > 0.1) player.angle = Math.atan2(iY, iX);

        // 射撃 & 熱
        if(actionPressed && !player.isOverheated) {
            if(Math.random() < 0.3) {
                bullets.push({x: player.x, y: player.y, vx: Math.cos(player.angle)*10, vy: Math.sin(player.angle)*10});
                player.heat += 4; sounds.shoot.currentTime=0; sounds.shoot.play().catch(()=>{});
            }
        }
        if(player.heat >= 100) { player.heat=100; player.isOverheated=true; overheatCount++; }
        player.heat = Math.max(0, player.heat - (player.isOverheated ? 0.5 : 1));
        if(player.heat === 0) player.isOverheated = false;
        document.getElementById('heat-bar').style.width = player.heat + '%';
        document.getElementById('heat-warning').style.visibility = player.isOverheated ? 'visible' : 'hidden';

        // 敵 & 弾
        if(Math.random() < 0.05) enemies.push({x: Math.random()*canvas.width, y: -20, s: 30, v: 2+Math.random()*2});
        bullets.forEach((b, bi) => {
            b.x += b.vx; b.y += b.vy;
            enemies.forEach((e, ei) => {
                if(Math.hypot(b.x-e.x, b.y-e.y) < e.s) { score+=100; enemies.splice(ei,1); bullets.splice(bi,1); }
            });
        });
        enemies.forEach((e, ei) => {
            e.y += e.v;
            if(isCollisionEnabled && Math.hypot(player.x-e.x, player.y-e.y) < 30) { missCount++; enemies.splice(ei,1); sounds.death.play(); }
        });
        document.getElementById('score').innerText = score;
    }

    function draw() {
        ctx.fillStyle = '#050510'; ctx.fillRect(0,0,canvas.width,canvas.height);
        stars.forEach(s => { s.y += s.v; if(s.y>canvas.height) s.y=0; ctx.fillStyle='white'; ctx.fillRect(s.x, s.y, s.s, s.s); });
        
        if(gameState === 'playing') {
            // 自機デザイン復元
            ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
            ctx.fillStyle = player.isOverheated ? '#444' : player.color;
            ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-15, 15); ctx.lineTo(-10, 0); ctx.lineTo(-15, -15); ctx.closePath(); ctx.fill();
            ctx.restore();
        }
        bullets.forEach(b => { ctx.fillStyle='yellow'; ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill(); });
        enemies.forEach(e => { ctx.strokeStyle='red'; ctx.strokeRect(e.x-15, e.y-15, 30, 30); });
    }

    function toggleCollision() {
        isCollisionEnabled = !isCollisionEnabled;
        document.getElementById('collision-toggle').innerText = isCollisionEnabled ? "⚠️ ON (危険)" : "🛡️ OFF (安全)";
        document.getElementById('collision-toggle').classList.toggle('active', isCollisionEnabled);
    }

    function setupControls() {
        const l = document.getElementById('left-panel'), r = document.getElementById('right-panel');
        const joyHTML = '<div class="joystick-base" id="joy-b"><div class="joystick-thumb" id="joy-t"></div></div>';
        const fireHTML = '<div class="fire-button" id="fire-b">FIRE</div>';
        if(gameMode===1) { l.innerHTML=joyHTML; r.innerHTML=fireHTML; } else { l.innerHTML=fireHTML; r.innerHTML=joyHTML; }
        
        const b = document.getElementById('joy-b');
        if(b) b.onpointerdown = (e) => { 
            joystick.active = true; joystick.pointerId = e.pointerId;
            const rect = b.getBoundingClientRect();
            joystick.originX = rect.left + rect.width/2; joystick.originY = rect.top + rect.height/2;
        };
        window.onpointermove = (e) => {
            if(!joystick.active) return;
            let dx = e.clientX - joystick.originX, dy = e.clientY - joystick.originY;
            let dist = Math.hypot(dx, dy);
            if(dist > joystick.maxRadius) { dx *= joystick.maxRadius/dist; dy *= joystick.maxRadius/dist; }
            joystick.vectorX = dx/joystick.maxRadius; joystick.vectorY = dy/joystick.maxRadius;
            document.getElementById('joy-t').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        };
        window.onpointerup = () => { joystick.active = false; joystick.vectorX=0; joystick.vectorY=0; if(document.getElementById('joy-t')) document.getElementById('joy-t').style.transform='translate(-50%,-50%)'; };
        
        const f = document.getElementById('fire-b');
        if(f) { f.onpointerdown = () => actionPressed = true; f.onpointerup = () => actionPressed = false; }
    }
</script>
</body>
</html>
