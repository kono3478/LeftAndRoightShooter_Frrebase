<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>スペース・ディフェンダー - Firebase Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #020205;
            --panel-color: #e0e0e0;
            --game-bg: #050510;
            --text-color: #ffffff;
            --accent-color: #00f2ff;
            --heat-color: #ff9f43;
            --danger-color: #ff4d4d;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; height: 100dvh;
            overflow: hidden; background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; touch-action: none;
        }

        #game-container { position: relative; width: 100vw; height: 100dvh; display: flex; overflow: hidden; }

        /* ID入力画面 */
        #id-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1b1b2f 0%, #020205 100%);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .id-box {
            background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px;
            border: 2px solid var(--accent-color); text-align: center; backdrop-filter: blur(10px);
        }
        .id-box input {
            background: #000; border: 1px solid var(--accent-color); color: var(--accent-color);
            font-size: 32px; width: 180px; text-align: center; margin: 20px 0; outline: none;
        }

        /* 既存の主要スタイル継承 */
        #screen-title {
            position: absolute; width: 100%; height: 100%; background: #020205;
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .btn-mode {
            padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer;
            background: transparent; border: 1px solid var(--accent-color); color: white;
            border-radius: 10px; transition: 0.3s;
        }
        .btn-mode:hover { background: rgba(0, 242, 255, 0.2); }

        #gameCanvas { width: 100%; height: 100%; background: var(--game-bg); display: block; }
        
        #hud {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            color: white; z-index: 20; text-align: center; pointer-events: none;
        }

        #screen-result {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(5, 5, 20, 0.95); border: 2px solid var(--accent-color);
            padding: 30px; border-radius: 20px; color: white; text-align: center; display: none; z-index: 150;
        }
    </style>
</head>
<body>

<div id="id-overlay">
    <div class="id-box">
        <h2 style="color: white;">PLAYER ACCESS</h2>
        <p style="color: #888;">4桁の数字を入力してください</p>
        <input type="text" id="player-id" maxlength="4" placeholder="0000">
        <br>
        <button class="btn-mode" onclick="initGame()">ENTRY</button>
    </div>
</div>

<div id="screen-title">
    <h1 style="color: var(--accent-color); letter-spacing: 5px;">SPACE DEFENDER</h1>
    <p style="color: #666; font-size: 12px;">Shift + D: Download CSV / Shift + R: Reset Server</p>
    <div style="margin-top: 20px;">
        <button class="btn-mode" onclick="startGame(1)">MODE 1 (LEFT STICK)</button>
        <button class="btn-mode" onclick="startGame(2)">MODE 2 (RIGHT STICK)</button>
    </div>
    <button id="col-btn" class="btn-mode" onclick="toggleCol()" style="font-size: 14px; opacity: 0.7;">Collision: OFF</button>
</div>

<div id="game-container">
    <div id="hud">
        <div style="font-size: 20px;">TIME: <span id="timer">30</span> | SCORE: <span id="score">0</span></div>
        <div id="heat-warning" style="color: var(--danger-color); visibility: hidden;">OVERHEAT!</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="screen-result">
        <h2 style="color: var(--accent-color);">MISSION RESULT</h2>
        <div id="final-score" style="font-size: 48px; margin: 20px;">0</div>
        <button class="btn-mode" onclick="location.reload()">TITLE</button>
    </div>
</div>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
        apiKey: "AIzaSyAWUDUE9GklRNJGg0OoaZrBDn4C91VEEEI",
        authDomain: "leftandroightshooter.firebaseapp.com",
        databaseURL: "https://leftandroightshooter-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "leftandroightshooter",
        storageBucket: "leftandroightshooter.firebasestorage.app",
        messagingSenderId: "696555404744",
        appId: "1:696555404744:web:47a3c35636d68995e094fd",
        measurementId: "G-TF47F86Q97"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Game States ---
    let playerID = "";
    let gameStage = 0; // 0: ID/Title, 1: Playing, 2: Result
    let score = 0;
    let timeLeft = 30;
    let isCollisionOn = false;
    let selectedMode = 1;
    let timerInterval;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- Initialize ---
    function initGame() {
        const input = document.getElementById('player-id');
        if (input.value.length === 4 && !isNaN(input.value)) {
            playerID = input.value;
            document.getElementById('id-overlay').style.display = 'none';
            document.getElementById('screen-title').style.display = 'flex';
            resize();
        } else {
            alert("数字4桁を入力してください");
        }
    }

    function toggleCol() {
        isCollisionOn = !isCollisionOn;
        document.getElementById('col-btn').innerText = "Collision: " + (isCollisionOn ? "ON" : "OFF");
    }

    function startGame(mode) {
        selectedMode = mode;
        gameStage = 1;
        score = 0;
        timeLeft = 30;
        document.getElementById('screen-title').style.display = 'none';
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) finishGame();
        }, 1000);

        animate();
    }

    function finishGame() {
        clearInterval(timerInterval);
        gameStage = 2;
        document.getElementById('screen-result').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        saveToFirebase();
    }

    // --- Data Management ---
    function saveToFirebase() {
        const data = {
            id: playerID,
            mode: "MODE" + selectedMode,
            collision: isCollisionOn ? "ON" : "OFF",
            score: score,
            date: new Date().toLocaleString()
        };
        db.ref('scores').push(data);
    }

    function downloadCSV() {
        db.ref('scores').once('value').then(snap => {
            const val = snap.val();
            if(!val) return alert("データがありません");
            let csv = "ID,Mode,Collision,Score,Date\n";
            Object.values(val).forEach(d => {
                csv += `${d.id},${d.mode},${d.collision},${d.score},${d.date}\n`;
            });
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "scores.csv"; a.click();
        });
    }

    // --- Shortcuts ---
    window.addEventListener('keydown', (e) => {
        if (playerID !== "") { // ID入力後のみ有効
            if (e.shiftKey && e.key === 'D') downloadCSV();
            if (e.shiftKey && e.key === 'R') {
                if(confirm("全データを削除しますか？")) db.ref('scores').remove();
            }
        }
    });

    // --- Simple Engine (Placeholder) ---
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);

    function animate() {
        if (gameStage !== 1) return;
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 簡易的な敵とクリック処理（ここを元のゲームロジックと結合してください）
        ctx.fillStyle = '#00f2ff';
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2);
        ctx.fill();

        requestAnimationFrame(animate);
    }

    canvas.addEventListener('mousedown', () => {
        if(gameStage === 1) {
            score += 100;
            document.getElementById('score').innerText = score;
        }
    });

</script>
</body>
</html>
